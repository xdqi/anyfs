<!doctype html>
<html>
<head><meta charset="utf-8"><title>anyfs core API debug</title></head>
<body>
<h1>anyfs core API debug</h1>
<pre id="log" style="background:#111;color:#0f0;padding:8px;white-space:pre-wrap;font:12px monospace"></pre>
<script type="module">
const logEl = document.getElementById('log');
const out = [];
function push(line) {
    out.push(line);
    logEl.textContent = out.join('\n');
    console.log(line);
}

push(`env: crossOriginIsolated=${self.crossOriginIsolated}, hasSAB=${typeof SharedArrayBuffer !== 'undefined'}`);

try {
    // Mimic what the vite-dev resolves @anyfs/core to — vite serves it from
    // the workspace via optimizeDeps exclude. Easier: load via the source URL.
    const { mountFile } = await import('/@fs${ANYFS_SRC}/ts/packages/core/dist/index.js');
    push('@anyfs/core loaded');

    const which = new URLSearchParams(location.search).get('img') || 'single';
    push(`fetching /disks/${which}.img …`);
    const res = await fetch(`/disks/${which}.img`);
    const ab = await res.arrayBuffer();
    push(`fetched ${ab.byteLength} B`);
    const file = new File([ab], `${which}.img`);

    push('mountFile() …');
    const disk = await mountFile(file, {
        workerUrl: '/wasm/anyfs.worker.js',
        wasmBaseUrl: '/wasm/',
    });
    push('disk ready');

    const parts = await disk.listPartitions();
    push(`partitions: ${JSON.stringify(parts)}`);

    if (parts.length === 0) {
        const mp = await disk.mountWhole('ext4');
        push(`mountWhole -> ${mp}`);
        const entries = await disk.readdir(mp);
        push(`readdir: ${JSON.stringify(entries)}`);

        const helo = entries.find(e => e.name === 'hello.txt');
        if (helo) {
            const path = `${mp}/hello.txt`;
            const st = await disk.stat(path);
            push(`stat: ${JSON.stringify(st)}`);
            const fd = await disk.open(path);
            const data = await disk.read(fd, 0, st.size);
            await disk.close(fd);
            push(`content: ${JSON.stringify(new TextDecoder().decode(data))}`);
        }
    }

    await disk.dispose();
    push('DONE-OK');
} catch (e) {
    push(`FATAL: ${e?.message ?? e}`);
    if (e?.stack) push(`stack:\n${e.stack}`);
    push('DONE-FAIL');
}
</script>
</body>
</html>
