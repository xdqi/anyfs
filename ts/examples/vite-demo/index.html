    <!-- Set the dark class before the bundle paints to avoid a light flash
         on reload when the saved theme is dark. Kept tiny + inline. -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('anyfs.settings.v1');
          var t = raw ? (JSON.parse(raw).theme || 'dark') : 'dark';
          var isDark = t === 'dark'
            || (t === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', isDark);
        } catch (e) { /* keep default dark class */ }
      })();
    </script>
  </head>
  <body class="bg-zinc-100 text-zinc-900 dark:bg-zinc-900 dark:text-zinc-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
