name: linux

# Builds the Linux x86_64 distribution tarball (anyfs-ksmbd + anyfs-nfsd +
# anyfs-fuse + liblkl.so + libanyfs-qemublk.so) and uploads it as an artifact.
#
# LKL kernel:  deps/linux  (via peru — xdqi/lkl@lkl-anyfs, unified ref for
#               linux-amd64 + mingw64 + wasm; see peru.yaml for pinned SHA)
# QEMU:        deps/qemu   (via peru — v11.0.0 pinned SHA)
# ksmbd-tools: deps/ksmbd-tools (via peru — pinned SHA)
#
# The `net/sunrpc/svc.c` rpcbind guard is applied by gen_lkl_config.sh itself
# (function patch_sunrpc_lkl_guard; idempotent via LKL_RPCBIND_GUARD marker),
# so anyfs-nfsd in the produced artifact does not hang at startup.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: linux-amd64
    runs-on: ubuntu-24.04
    timeout-minutes: 75

    steps:
      - name: Checkout anyfs-reader
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential meson ninja-build pkg-config python3 pipx \
            flex bison bc rsync libelf-dev libssl-dev \
            libglib2.0-dev liburing-dev libaio-dev \
            libzstd-dev libbz2-dev zlib1g-dev libpixman-1-dev \
            libfuse3-dev libnl-3-dev libnl-genl-3-dev \
            libcurl4-openssl-dev \
            patchelf ca-certificates \
            smbclient nfs-common curl \
            shellcheck

      # ── Caches ──────────────────────────────────────────────────────────────
      # All source deps (linux, qemu, ksmbd-tools) are now managed by peru and
      # cached together under ./deps/. Key on peru.yaml (SHA-pinned — no lock
      # file; cache rebuilds exactly when any pin moves).
      - name: Cache peru-synced deps
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('peru.yaml') }}

      # ksmbd-tools is compiled (meson) for linux-amd64; cache its build output
      # separately so a pure-source peru-cache-hit doesn't need to re-compile.
      # Key matches deps cache so they miss together when ksmbd pin changes.
      - name: Cache ksmbd-tools build (linux-amd64)
        id: cache-ksmbd-build
        uses: actions/cache@v4
        with:
          path: build-ksmbd-linux-amd64
          key: ksmbd-build-linux-amd64-${{ hashFiles('peru.yaml') }}

      # Per-target LKL kernel build output (config + object tree). Key includes
      # the script hashes so it rebuilds when gen/build/patch logic changes.
      - name: Cache LKL per-target build (linux-amd64)
        id: cache-lkl
        uses: actions/cache@v4
        with:
          path: lkl-linux-amd64
          key: lkl-linux-amd64-${{ hashFiles('peru.yaml', 'scripts/gen_lkl_config.sh', 'scripts/build_lkl.sh', 'scripts/oot_fs.sh', '.github/workflows/linux.yml') }}
          restore-keys: |
            lkl-linux-amd64-

      - name: Cache OOT FS sources (NTFS PLUS + APFS + OpenZFS)
        id: cache-oot
        uses: actions/cache@v4
        with:
          path: ~/oot-fs
          key: oot-fs-${{ hashFiles('scripts/oot_fs.sh') }}
          restore-keys: |
            oot-fs-

      - name: Cache QEMU per-target build (linux-amd64)
        id: cache-qemu
        uses: actions/cache@v4
        with:
          path: deps/qemu/build-anyfs-linux-amd64
          key: qemu-linux-amd64-${{ hashFiles('peru.yaml', 'scripts/build_qemu.sh') }}
          restore-keys: |
            qemu-linux-amd64-

      # ── Fetch pinned dependencies ───────────────────────────────────────────
      - name: Install peru
        run: |
          pipx install peru
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"   # pipx installs here; ensure peru is on PATH for later steps

      - name: Sync pinned dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: peru sync

      # Doctor checks: meson/ninja/peru/python3, native ld >= 2.30, deps synced.
      # NOTE: doctor also checks mingw cross and wasm-ld, which are NOT present
      # in this job (linux-amd64 doesn't need them). We run doctor advisory-only
      # (|| echo) so relevant checks surface in the log without blocking the job
      # on irrelevant ones. The wasm-ld and mingw checks will print FAIL but that
      # is expected and harmless here.
      - name: Preflight (doctor)
        run: ./scripts/doctor.sh || echo "doctor reported issues (advisory — mingw/wasm-ld checks are expected to fail in this job)"

      - name: Lint — no hardcoded paths in migrated build scripts
        run: ./scripts/lint-no-hardcoded-paths.sh

      - name: Lint — shellcheck
        run: ./scripts/lint-shellcheck.sh

      # ── Build ksmbd-tools (linux-amd64) ────────────────────────────────────
      - name: Build ksmbd-tools
        if: steps.cache-ksmbd-build.outputs.cache-hit != 'true'
        run: |
          meson setup build-ksmbd-linux-amd64 deps/ksmbd-tools
          meson compile -C build-ksmbd-linux-amd64

      # Out-of-tree FS sources: NTFS PLUS, APFS, OpenZFS. gen_lkl_config.sh
      # internally runs `oot_fs.sh stage`, which silently no-ops if the
      # source directories don't exist — so without a prior fetch the
      # produced kernel lacks all three drivers.
      - name: Fetch OOT FS sources
        if: steps.cache-oot.outputs.cache-hit != 'true'
        run: |
          ./scripts/oot_fs.sh fetch
          ls -la "$HOME/oot-fs" || true

      # ── Build pipeline ──────────────────────────────────────────────────────
      - name: Generate LKL kernel config (applies LKL_RPCBIND_GUARD)
        run: |
          ./scripts/gen_lkl_config.sh \
            --linux=deps/linux \
            --out="$GITHUB_WORKSPACE" \
            --targets=linux-amd64

      - name: Build LKL kernel
        run: |
          ./scripts/build_lkl.sh \
            --linux=deps/linux \
            --out="$GITHUB_WORKSPACE" \
            --targets=linux-amd64 \
            -j"$(nproc)"
          # package_linux.sh falls back to $HOME/linux/tools/lkl/lib/liblkl.so —
          # link the per-target build there so packaging finds it.
          mkdir -p deps/linux/tools/lkl/lib
          ln -sf "$GITHUB_WORKSPACE/lkl-linux-amd64/tools/lkl/lib/liblkl.so" \
                 deps/linux/tools/lkl/lib/liblkl.so

      - name: Build QEMU block layer
        run: |
          ./scripts/build_qemu.sh \
            --qemu-src=deps/qemu \
            --targets=linux-amd64 \
            -j"$(nproc)"

      - name: Build anyfs-reader (core + server + fuse)
        run: |
          ./scripts/build_anyfs.sh \
            --targets=linux-amd64 \
            --components=core,server,fuse \
            --lkl-src=deps/linux \
            --qemu-root=deps/qemu \
            --ksmbd-root=deps/ksmbd-tools \
            -j"$(nproc)"

      - name: Run C unit tests
        run: meson test -C build-anyfs-linux-amd64 --suite unit --print-errorlogs

      - name: Wasm export drift gate
        run: ./tests/test_wasm_exports.sh

      # ── Integration smoke test ──────────────────────────────────────────────
      # Boots each anyfs binary against a Debian 13 generic-cloud qcow2 and
      # asserts lspart/smbclient/nfs see a real Debian rootfs. This catches
      # regressions in the QEMU block backend, ksmbd-tools wiring, and the
      # host_proxy data path that a pure compile job would miss.
      - name: Cache Debian 13 qcow2
        id: cache-debian
        uses: actions/cache@v4
        with:
          path: /tmp/debian-13-genericcloud-amd64.qcow2
          key: debian-13-genericcloud-amd64-v1

      - name: Download Debian 13 qcow2
        if: steps.cache-debian.outputs.cache-hit != 'true'
        run: |
          curl -fsSL --retry 3 -o /tmp/debian-13-genericcloud-amd64.qcow2 \
            https://cloud.debian.org/images/cloud/trixie/latest/debian-13-genericcloud-amd64.qcow2
          ls -lh /tmp/debian-13-genericcloud-amd64.qcow2

      - name: Run integration smoke test
        run: |
          ./tests/smoke-debian-qcow2.sh \
            --build-dir="$GITHUB_WORKSPACE/build-anyfs-linux-amd64" \
            --nfs-mount \
            /tmp/debian-13-genericcloud-amd64.qcow2

      - name: Package distribution tarball
        run: |
          # package_linux.sh searches $HOME/linux and $HOME/qemu for .so files
          # (historical defaults). Symlink them to the peru-synced deps so the
          # script finds liblkl.so and libanyfs-qemublk.so without modification.
          ln -sfn "$GITHUB_WORKSPACE/deps/linux" "$HOME/linux" || true
          ln -sfn "$GITHUB_WORKSPACE/deps/qemu"  "$HOME/qemu"  || true
          ./scripts/package_linux.sh build-anyfs-linux-amd64
          ls -la /tmp/anyfs-reader-*-linux-amd64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyfs-reader-linux-amd64
          path: /tmp/anyfs-reader-*-linux-amd64.tar.gz
          if-no-files-found: error
          retention-days: 14
