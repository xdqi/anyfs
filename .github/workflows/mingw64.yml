name: mingw64

# Cross-compiles the Windows x86_64 distribution tarball
# (anyfs-ksmbd.exe + anyfs-nfsd.exe + anyfs-lspart.exe + liblkl.dll +
# libanyfs-qemublk.dll + the msys2-cross runtime DLL closure) and uploads
# it as an artifact.
#
# Toolchain comes from msys.kosaka.moe/repo (the msys-cross pacman repo
# mirrored from ~/msys2-cross). bootstrap.tar.xz unpacks a self-contained
# pacman-static under /opt/msys2-cross; we then install the mingw64 GCC +
# binutils + pkg-config packages, plus the upstream MSYS2 sysroot libraries
# (glib2, zlib, zstd, bzip2) that LKL/QEMU/anyfs link against.
#
# anyfs-winfsp.exe is intentionally skipped: WinFSP headers aren't available
# in CI, and the server tarball doesn't need the FUSE frontend.
#
# LKL kernel:  deps/linux  (via peru — xdqi/lkl@lkl-anyfs, unified ref for
#               linux-amd64 + mingw64 + wasm; replaces the former separate
#               xdqi/lkl@lkl-win64-6.18 clone. The LLP64 / page-folio fixes
#               from the win64 port are merged into the unified lkl-anyfs
#               branch; see peru.yaml for the pinned SHA.)
# QEMU:        deps/qemu   (via peru — v11.0.0 pinned SHA)
# ksmbd-tools: deps/ksmbd-tools (via peru; source-only — anyfs-ksmbd compiles
#               selected .c files directly; the userspace binaries aren't shipped)
# util-linux:  deps/util-linux  (via peru; source-only for libblkid mingw build)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Ephemeral sccache-dist compile farm. Workers serve the coordinator
  # (the build job) and exit when it goes offline. Skipped on PRs —
  # fork PRs have no TS_OAUTH_SECRET and same-repo PRs don't need the
  # farm for cache-warm builds. Also skipped when TS_OAUTH_SECRET is not
  # configured, so missing-secret runs stay green instead of failing the
  # worker jobs. (The secrets context is not allowed in `if` expressions,
  # so its presence is laundered through job-level env.)
  sccache-workers:
    name: sccache worker ${{ matrix.idx }}
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      matrix:
        idx: [1, 2]
    env:
      FARM_SECRET_SET: ${{ secrets.TS_OAUTH_SECRET != '' }}
    steps:
      - name: Farm disabled — TS_OAUTH_SECRET not configured
        if: ${{ env.FARM_SECRET_SET == 'false' }}
        run: echo "TS_OAUTH_SECRET is not set; skipping farm worker (build compiles locally)."
      - uses: xdqi/sccache-dist-action@v0.0.5
        if: ${{ env.FARM_SECRET_SET == 'true' }}
        with:
          mode: worker
          worker-index: '${{ matrix.idx }}'
          oauth-secret: '${{ secrets.TS_OAUTH_SECRET }}'
          # The OAuth client owns tag:ci (not the action default tag:ci-sccache).
          tags: 'tag:ci'

  build:
    name: mingw64
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    env:
      MSYS_CROSS_REPO: https://msys.kosaka.moe/repo
      MSYS_CROSS_PREFIX: /opt/msys2-cross
      FARM_SECRET_SET: ${{ secrets.TS_OAUTH_SECRET != '' }}

    steps:
      - name: Checkout anyfs-reader
        uses: actions/checkout@v4

      - name: Install host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential meson ninja-build pkg-config python3 pipx \
            flex bison bc rsync libelf-dev libssl-dev \
            fakeroot xz-utils ca-certificates curl

      # ── msys2-cross toolchain ───────────────────────────────────────────────
      # The bootstrap tarball ships a relocatable pacman-static + pacman.conf
      # pointing at file:///repo. Rewrite to msys.kosaka.moe/repo, then pull
      # in the mingw64 toolchain packages plus the upstream MSYS2 sysroot
      # libraries (glib2/zlib/zstd/bzip2) that build_lkl.sh and
      # build_qemu.sh expect under /opt/msys2-cross/mingw64.
      - name: Cache msys2-cross toolchain
        id: cache-msys
        uses: actions/cache@v4
        with:
          path: ${{ env.MSYS_CROSS_PREFIX }}
          key: msys-cross-mingw64-v1-${{ hashFiles('.github/workflows/mingw64.yml') }}

      - name: Install msys2-cross toolchain
        if: steps.cache-msys.outputs.cache-hit != 'true'
        run: |
          curl -fsSL --retry 3 -o /tmp/bootstrap.tar.xz \
            "${MSYS_CROSS_REPO}/bootstrap.tar.xz"
          sudo mkdir -p /opt
          sudo tar -xJf /tmp/bootstrap.tar.xz -C /opt
          test -x "${MSYS_CROSS_PREFIX}/bin/msys-pacman"

          # Sync DB then install. mingw64-gcc pulls binutils + filesystem +
          # ca-certificates transitively; we name them explicitly anyway.
          # The bootstrap's pacman.conf already points [msys-cross] at
          # msys.kosaka.moe/repo and [mingw64] at repo.msys2.org.
          sudo "${MSYS_CROSS_PREFIX}/bin/msys-pacman" -Sy --noconfirm
          # cygwin-gcc is required by the LKL-side x86_64-w64-mingw32-gcc
          # wrapper (tools/lkl/bin/) on xdqi/lkl@lkl-anyfs: kernel-side
          # objects compile/link through cygwin-gcc (LP64) to avoid the
          # IMAGE_REL_AMD64_REL32 overflow that MinGW ld hits on the
          # ~320 MiB lkl.o; user-space side stays on mingw-gcc (LLP64).
          sudo "${MSYS_CROSS_PREFIX}/bin/msys-pacman" -S --noconfirm \
            msys-cross-mingw64-binutils \
            msys-cross-mingw64-gcc \
            msys-cross-cygwin-binutils \
            msys-cross-cygwin-gcc \
            msys-cross-mingw64-pkgconf

          # MSYS2 upstream sysroot libs under /opt/msys2-cross/mingw64.
          # QEMU block layer + DLL closure deps that package_mingw64.sh
          # pulls from bin/.
          sudo "${MSYS_CROSS_PREFIX}/bin/msys-pacman" -S --noconfirm \
            mingw-w64-x86_64-glib2 \
            mingw-w64-x86_64-zlib \
            mingw-w64-x86_64-zstd \
            mingw-w64-x86_64-bzip2 \
            mingw-w64-x86_64-curl

      - name: Put msys2-cross on PATH
        run: |
          echo "${MSYS_CROSS_PREFIX}/bin" >> "$GITHUB_PATH"
          echo "=== sanity ==="
          "${MSYS_CROSS_PREFIX}/bin/x86_64-w64-mingw32-gcc" --version | head -1
          "${MSYS_CROSS_PREFIX}/bin/x86_64-w64-mingw32-ld" --version | head -1
          "${MSYS_CROSS_PREFIX}/bin/x86_64-w64-mingw32-pkg-config" \
            --modversion glib-2.0

      # ── sccache-dist farm (best-effort; build proceeds locally if absent) ──
      # EXPERIMENTAL on this leg: sccache-dist must package the msys2-cross
      # x86_64-w64-mingw32-gcc toolchain (under /opt/msys2-cross) and ship it
      # to the workers. The engine supports arbitrary-toolchain packaging, but
      # a plain cross-gcc + sysroot is unproven here. On any farm failure the
      # build falls back to local compilation exactly as before.
      # Gated on TS_OAUTH_SECRET: without it the farm cannot come up, so skip
      # the whole block (sccache never lands on PATH and the build uses the
      # plain cross-gcc, exactly like the PR path).
      - name: Cache sccache objects
        if: ${{ github.event_name != 'pull_request' && env.FARM_SECRET_SET == 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/sccache
          key: sccache-mingw64-${{ github.sha }}
          restore-keys: |
            sccache-mingw64-

      - name: Bring up sccache-dist farm
        if: ${{ github.event_name != 'pull_request' && env.FARM_SECRET_SET == 'true' }}
        continue-on-error: true
        uses: xdqi/sccache-dist-action@v0.0.5
        with:
          mode: coordinator
          expected-workers: 2
          min-workers: 1
          wait-timeout: 180s
          oauth-secret: '${{ secrets.TS_OAUTH_SECRET }}'
          # The OAuth client owns tag:ci (not the action default tag:ci-sccache).
          tags: 'tag:ci'

      # ── Caches ──────────────────────────────────────────────────────────────
      # All source deps (linux, qemu, ksmbd-tools, util-linux) are now managed
      # by peru and cached together under ./deps/. Key on peru.yaml (SHA-pinned
      # — no lock file; cache rebuilds exactly when any pin moves).
      - name: Cache peru-synced deps
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ hashFiles('peru.yaml') }}

      # Per-target LKL kernel build output (config + object tree). Key includes
      # script hashes so it rebuilds when gen/build/patch logic changes.
      - name: Cache LKL per-target build (mingw64)
        id: cache-lkl
        uses: actions/cache@v4
        with:
          path: lkl-mingw64
          key: lkl-mingw64-${{ hashFiles('peru.yaml', 'scripts/gen_lkl_config.sh', 'scripts/build_lkl.sh', 'scripts/oot_fs.sh', '.github/workflows/mingw64.yml') }}
          restore-keys: |
            lkl-mingw64-

      - name: Cache OOT FS sources (NTFS PLUS + APFS + OpenZFS)
        id: cache-oot
        uses: actions/cache@v4
        with:
          path: ~/oot-fs
          key: oot-fs-${{ hashFiles('scripts/oot_fs.sh') }}
          restore-keys: |
            oot-fs-

      - name: Cache QEMU per-target build (mingw64)
        id: cache-qemu
        uses: actions/cache@v4
        with:
          path: deps/qemu/build-anyfs-mingw64
          key: qemu-mingw64-${{ hashFiles('peru.yaml', 'scripts/build_qemu.sh') }}
          restore-keys: |
            qemu-mingw64-

      # ── Fetch pinned dependencies ───────────────────────────────────────────
      - name: Install peru
        run: |
          pipx install peru
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"   # pipx installs here; ensure peru is on PATH for later steps

      - name: Sync pinned dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: peru sync

      # Stage libblkid/src/blkid.h from the util-linux source in deps/.
      # util-linux's autotools normally produces blkid.h from blkid.h.in; we
      # substitute the version macros from patches/libblkid/shim/config.h to
      # skip running ./configure entirely. This replaces the former inline step
      # that was bundled with the util-linux clone.
      - name: Stage blkid.h from deps/util-linux
        run: |
          ver=$(grep -E '^#define LIBBLKID_VERSION' \
            patches/libblkid/shim/config.h | awk -F'"' '{print $2}')
          date=$(grep -E '^#define LIBBLKID_DATE' \
            patches/libblkid/shim/config.h | awk -F'"' '{print $2}')
          test -n "$ver" && test -n "$date" \
            || { echo "::error::LIBBLKID_VERSION/DATE missing in shim/config.h"; exit 1; }
          sed -e "s/@LIBBLKID_VERSION@/$ver/g" -e "s/@LIBBLKID_DATE@/$date/g" \
            deps/util-linux/libblkid/src/blkid.h.in \
            > deps/util-linux/libblkid/src/blkid.h

      # Doctor checks: meson/ninja/peru/python3, native ld, mingw cross.
      # NOTE: doctor also checks wasm-ld, which is NOT present in this job
      # (mingw64 doesn't need it). We run advisory-only (|| echo) so the
      # mingw cross check (relevant here) still surfaces as ok/FAIL without
      # blocking the job on the wasm-ld miss.
      - name: Preflight (doctor)
        run: ./scripts/doctor.sh || echo "doctor reported issues (advisory — wasm-ld check is expected to fail in this job)"

      - name: Fetch OOT FS sources
        if: steps.cache-oot.outputs.cache-hit != 'true'
        run: |
          ./scripts/oot_fs.sh fetch
          ls -la "$HOME/oot-fs" || true

      # ── Build pipeline ──────────────────────────────────────────────────────
      - name: Generate LKL kernel config (mingw64)
        run: |
          ./scripts/gen_lkl_config.sh \
            --linux=deps/linux \
            --out="$GITHUB_WORKSPACE" \
            --targets=mingw64

      - name: Build LKL kernel (mingw64)
        run: |
          # Absolute compiler path so sccache-dist hashes and ships the
          # msys2-cross toolchain (not whatever "x86_64-w64-mingw32-gcc"
          # resolves to on a worker).
          CC_ARGS=()
          if command -v sccache >/dev/null 2>&1; then
            CC_ARGS=(--cc="sccache /opt/msys2-cross/bin/x86_64-w64-mingw32-gcc")
          fi
          ./scripts/build_lkl.sh \
            --linux=deps/linux \
            --out="$GITHUB_WORKSPACE" \
            --targets=mingw64 \
            "${CC_ARGS[@]}" \
            -j"${SCCACHE_J:-$(nproc)}"
          test -f "$GITHUB_WORKSPACE/lkl-mingw64/tools/lkl/lib/liblkl.dll" \
            || { echo "::error::liblkl.dll missing"; exit 1; }

      - name: Build QEMU block layer (mingw64)
        run: |
          ./scripts/build_qemu.sh \
            --qemu-src=deps/qemu \
            --targets=mingw64 \
            -j"$(nproc)"

      - name: Build libblkid (mingw64)
        run: |
          UL_SRC=deps/util-linux ./scripts/build_libblkid_mingw.sh mingw64
          test -f "$GITHUB_WORKSPACE/build-blkid-mingw64/lib/libblkid.a" \
            || { echo "::error::libblkid.a missing"; exit 1; }

      - name: Build anyfs-reader (core + server)
        run: |
          ./scripts/build_anyfs.sh \
            --targets=mingw64 \
            --components=core,server \
            --lkl-src=deps/linux \
            --qemu-root=deps/qemu \
            --ksmbd-root=deps/ksmbd-tools \
            -j"$(nproc)"

      - name: sccache stats
        if: ${{ github.event_name != 'pull_request' && env.FARM_SECRET_SET == 'true' }}
        continue-on-error: true
        run: sccache --show-stats || true

      - name: Package Win64 distribution tarball
        run: |
          ./scripts/package_mingw64.sh
          ls -la /tmp/anyfs-reader-*-win64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anyfs-reader-win64
          path: /tmp/anyfs-reader-*-win64.tar.gz
          if-no-files-found: error
          retention-days: 14
